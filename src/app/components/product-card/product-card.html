<div class="product-card" (click)="viewDetails.emit(product)">
  <!-- Card Visual Header -->
  <div class="card-visual-wrapper" [style.background]="product.colorTheme">
    <!-- Category Badge -->
    <span class="category-badge badge badge-green">{{ product.category }}</span>
    
    <!-- Info Button (i) -->
    <button class="info-trigger-btn" (click)="viewDetails.emit(product); $event.stopPropagation()" aria-label="View Details">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
    </button>

    <!-- Vector Icon Centerpiece -->
    <div class="product-vector-art">
      <svg class="vector-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path [attr.d]="product.svgPath"></path>
      </svg>
      <span class="product-emoji-overlay">{{ product.emoji }}</span>
    </div>
  </div>

  <!-- Card Body Details -->
  <div class="card-details-wrapper">
    <div class="card-meta">
      <h3 class="product-title">{{ product.name }}</h3>
      <span class="product-quantity">{{ product.quantity }}</span>
    </div>

    <div class="card-footer-row">
      <span class="product-price">{{ product.price | currency:'INR':'symbol-narrow':'1.0-0' }}</span>
      <button class="btn-card-add" (click)="addToCart.emit(product); $event.stopPropagation()" aria-label="Add to Cart">
        <svg class="add-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>
</div>
