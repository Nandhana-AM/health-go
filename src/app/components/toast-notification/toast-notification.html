<div class="toasts-container">
  <div *ngFor="let toast of toasts()" class="toast-card" [class.toast-info]="toast.type === 'info'">
    <div class="toast-icon-wrapper">
      <!-- Success Icon -->
      <svg *ngIf="toast.type === 'success'" class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <!-- Info Icon -->
      <svg *ngIf="toast.type === 'info'" class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
    </div>
    <span class="toast-message-text">{{ toast.message }}</span>
  </div>
</div>
