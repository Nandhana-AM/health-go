<div *ngIf="product" class="modal-backdrop" (click)="close.emit()">
  <div class="modal-container glass-panel animate-fade-in" (click)="$event.stopPropagation()">
    <!-- Close Button -->
    <button class="modal-close-btn" (click)="close.emit()" aria-label="Close Modal">
      <svg class="close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <div class="modal-grid">
      <!-- Left Column: Visual Artwork -->
      <div class="modal-visual-column" [style.background]="product.colorTheme">
        <div class="artwork-backdrop">
          <svg class="artwork-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path [attr.d]="product.svgPath"></path>
          </svg>
          <span class="artwork-emoji">{{ product.emoji }}</span>
        </div>
      </div>

      <!-- Right Column: Details & Info -->
      <div class="modal-details-column">
        <div class="modal-meta">
          <span class="badge badge-green">{{ product.category }}</span>
          <h2 class="modal-title">{{ product.name }}</h2>
          <span class="modal-qty-text">Pack Size: {{ product.quantity }}</span>
        </div>

        <div class="modal-price-row">
          <span class="modal-price">{{ product.price | currency:'INR':'symbol-narrow':'1.0-0' }}</span>
        </div>

        <!-- Ingredients Section -->
        <div class="info-section">
          <h3 class="section-title">
            <svg class="section-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            Ingredients
          </h3>
          <ul class="ingredients-list">
            <li *ngFor="let ingredient of product.ingredients" class="ingredient-item">
              {{ ingredient }}
            </li>
          </ul>
        </div>

        <!-- Health Benefits Section -->
        <div class="info-section">
          <h3 class="section-title">
            <svg class="section-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
            Health Benefits
          </h3>
          <ul class="benefits-list">
            <li *ngFor="let benefit of product.benefits" class="benefit-item">
              <svg class="benefit-check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              <span>{{ benefit }}</span>
            </li>
          </ul>
        </div>

        <!-- Footer Control Row -->
        <div class="modal-footer-controls">
          <div class="qty-selector">
            <button class="qty-btn" (click)="decrement()" [disabled]="quantity() <= 1" aria-label="Decrease Quantity">-</button>
            <span class="qty-number">{{ quantity() }}</span>
            <button class="qty-btn" (click)="increment()" aria-label="Increase Quantity">+</button>
          </div>
          <button class="btn-primary flex-grow-btn" (click)="submitAddToCart()">
            <svg class="btn-cart-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span>Add to Cart ({{ product.price * quantity() | currency:'INR':'symbol-narrow':'1.0-0' }})</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
