<header class="navbar-header glass-panel">
  <div class="navbar-container">
    <!-- Brand Logo -->
    <a href="#" class="brand-logo" (click)="scrollToSection('home'); $event.preventDefault()">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 1 8a7 7 0 0 1-9 10z"/>
        <path d="M9 22v-4"/>
      </svg>
      <span class="brand-text">Health<span class="accent-text">Go</span></span>
    </a>

    <!-- Navigation Links -->
    <nav class="nav-menu">
      <a class="nav-link" (click)="scrollToSection('home')">Home</a>
      <a class="nav-link" (click)="scrollToSection('shop')">Products</a>
      <a class="nav-link" (click)="scrollToSection('benefits')">Our Values</a>
    </nav>

    <!-- Header Actions (Cart & Auth) -->
    <div class="nav-actions">
      <!-- Cart Button -->
      <button class="cart-toggle-btn" (click)="openCart.emit()" aria-label="Open Cart">
        <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span *ngIf="totalItems() > 0" class="cart-badge" [class.badge-pop]="true">
          {{ totalItems() }}
        </span>
      </button>

      <!-- Authenticated User Dropdown -->
      <div *ngIf="isLoggedIn(); else anonymousUser" class="user-menu-wrapper">
        <button class="user-menu-btn" (click)="toggleUserDropdown()" aria-label="User Menu">
          <span class="user-avatar">{{ currentUser()?.email?.charAt(0)?.toUpperCase() }}</span>
        </button>
        
        <div class="user-dropdown glass-panel animate-fade-in" *ngIf="showDropdown()">
          <div class="user-dropdown-header">
            <span class="user-email">{{ currentUser()?.email }}</span>
          </div>
          <button class="dropdown-item" (click)="viewOrders()">
            <svg class="dropdown-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <span>Order History</span>
          </button>
          <button class="dropdown-item logout-btn" (click)="onLogout()">
            <svg class="dropdown-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>Logout</span>
          </button>
        </div>
      </div>

      <!-- Anonymous User Action -->
      <ng-template #anonymousUser>
        <button class="btn-signin" (click)="openAuth.emit()">
          <svg class="signin-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span class="signin-text">Sign In</span>
        </button>
      </ng-template>
    </div>
  </div>
</header>
